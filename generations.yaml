generations:
  - name: "First Generation (SP2)"
    start_year: 2019
    end_year: 2025
    description: "The first generation Kia Seltos debuted as a subcompact crossover SUV positioned between the smaller Stonic/Soul and the larger Sportage in Kia's global lineup. Launched on July 18, 2019 (South Korea) and August 22, 2019 (India), the Seltos was designated as a global product with three variations: SP2 (South Korean-built, aimed at developed markets including North America and Australasia), SP2i (Indian-built for emerging markets), and SP2c/China KX3. The SP2 model shared its platform with the Hyundai Kona and Kia Soul (Hyundai-Kia B-SUV platform), while SP2i/SP2c used the Hyundai-Kia K2 platform. Engine options included 1.6L Gamma turbocharged GDI, 2.0L Nu naturally aspirated MPI, and diesel 1.5L/1.6L CRDi variants, paired with CVT, 7-speed DCT, or 6-speed automatic transmissions. A significant facelift was introduced in July 2022 (South Korea) and July 2023 (India), featuring redesigned front clip, revised dashboard with dual 10.25-inch displays, and the new Kia badge. The Seltos established itself as a strong competitor in the subcompact SUV segment, becoming Kia's second best-selling model globally. Production ended in December 2025 when the second generation was introduced."

  - name: "Second Generation (SP3)"
    start_year: 2025
    end_year: null
    description: "The second generation Kia Seltos (codename SP3) represents a complete redesign built on the new Hyundai-Kia K3 platform, shared with the third-generation Hyundai Kona (SX2). Unveiled simultaneously in Korea, India, Europe, and America on December 10, 2025, the new Seltos features more modern styling with updated tiger-nose design language and a comprehensive interior upgrade. Designed by Karim Habib, the vehicle maintains its subcompact crossover positioning while offering improved technology, efficiency, and driving dynamics compared to its predecessor. All-wheel drive remains available on higher trims. Production began in December 2025 in India ahead of the January 2, 2026 launch."